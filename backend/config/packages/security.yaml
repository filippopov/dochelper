security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

  providers:
    app_user_provider:
      entity:
        class: App\Entity\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api_public:
      pattern: ^/api/(login|register|token/refresh|doc|doc\.json)$
      stateless: true
      security: false

    api:
      pattern: ^/api
      stateless: true
      provider: app_user_provider
      jwt: ~

  access_control:
    - { path: ^/api/(login|register|token/refresh|doc|doc\.json)$, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: ROLE_USER }
